<!DOCTYPE html>
<html>
<head>
    <title>Disaster Management - Reports</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0b3c5d;
            --secondary: #1d70a2;
            --accent: #c0392b;
            --bg-light: #f4f6f8;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--bg-light);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 15px;
        }

        .content {
            display: flex;
        }

        .sidebar {
            width: 200px;
            background: var(--secondary);
            color: white;
            min-height: 100vh;
        }

        .sidebar h3 {
            padding: 15px;
            margin: 0;
            cursor: pointer;
        }

        .sidebar h3:hover {
            background: var(--accent);
        }

        .data {
            padding: 20px;
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
        }

        tr:hover {
            background: #f1f7ff;
        }

        /* 🔥 Full Description Styling */
        .description {
            max-width: 300px;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

    </style>
</head>

<body>

<header>
    Emergency Response System - Admin
</header>

<div class="content">

    <div class="sidebar">
        <h3 onclick="location.href='Dashboard.html'">Dashboard</h3>
    </div>

    <div class="data">
        <h2>Reports</h2>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Description</th>
                    <th>Time</th>
                </tr>
            </thead>

            <tbody id="reportsTable">
                <tr>
                    <td colspan="6" class="loading">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
const SUPABASE_URL = 'https://idogfmuksxbjjmrfdclk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_49Wi0aMQU0u1YF4nF3PQvg_WbwUscRs';

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const tableBody = document.getElementById("reportsTable");

async function loadReports() {
    try {
        const { data, error } = await supa
            .from('Report')
            .select('*')
            .order('id', { ascending: false });

        if (error) throw error;

        tableBody.innerHTML = "";

        if (!data || data.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='6'>No Data</td></tr>";
            return;
        }

        data.forEach(r => {
            const row = `
                <tr>
                    <td>${r.fullname || ''}</td>
                    <td>${r.mobile || ''}</td>
                    <td>${r.disasterType || ''}</td>
                    <td>${r.location || ''}</td>

                    <!-- ✅ Full Description -->
                    <td class="description">
                        ${r.discription || ''}
                    </td>

                    <td>${r.datetime || ''}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

    } catch (err) {
        tableBody.innerHTML = "<tr><td colspan='6'>Error loading data</td></tr>";
        console.error(err);
    }
}

window.onload = loadReports;
</script>

</body>
</html>
