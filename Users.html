<!DOCTYPE html>
<html>
<head>
    <title>Disaster Management Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0b3c5d;
            --secondary: #1d70a2;
            --accent: #c0392b;
            --bg-light: #f4f6f8;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: var(--bg-light);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 16px 25px;
            font-size: 20px;
            font-weight: bold;
        }

        .content {
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: var(--secondary);
            min-height: 100vh;
        }

        .sidebar h3 {
            margin: 0;
            padding: 14px 20px;
            color: white;
            cursor: pointer;
        }

        .sidebar h3:hover {
            background: var(--accent);
        }

        .data {
            padding: 25px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* 🔥 TABLE DESIGN */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        th {
            background: var(--primary);
            color: white;
            padding: 14px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #eef5ff;
            transition: 0.2s;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }

        /* Badge (optional nice look) */
        .badge {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

    </style>
</head>

<body>

<header>
    Emergency Response System
</header>

<div class="content">

    <div class="sidebar">
        <h3 onclick="location.href='Dashboard.html'">Dashboard</h3>
    </div>

    <div class="data">
        <h1>Users</h1>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Contact Number</th>
                    <th>Location</th>
                </tr>
            </thead>

            <tbody id="usersTable">
                <tr>
                    <td colspan="3" class="loading">Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
const SUPABASE_URL = 'https://idogfmuksxbjjmrfdclk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_49Wi0aMQU0u1YF4nF3PQvg_WbwUscRs';

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadUsers() {

    const tableBody = document.getElementById("usersTable");

    tableBody.innerHTML =
        "<tr><td colspan='3' class='loading'>Loading data...</td></tr>";

    try {
        const { data, error } = await supa
            .from('Report')
            .select('*')
            .order('id', { ascending: false });

        if (error) throw error;

        tableBody.innerHTML = "";

        if (!data || data.length === 0) {
            tableBody.innerHTML =
                "<tr><td colspan='3' class='loading'>No users found</td></tr>";
            return;
        }

        data.forEach(user => {
            const row = `
                <tr>
                    <td>${user.fullname || '-'}</td>
                    <td><span class="badge">${user.mobile || '-'}</span></td>
                    <td>${user.location || '-'}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
        tableBody.innerHTML =
            "<tr><td colspan='3' class='loading' style='color:red;'>Error loading data</td></tr>";
    }
}

window.onload = loadUsers;
</script>

</body>
</html>
