<!DOCTYPE html>
<html>
<head>

<title>Disaster Management Dashboard - Logs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--primary:#0b3c5d;
--secondary:#1d70a2;
--accent:#c0392b;
--bg:#f4f6f8;
--white:#fff;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
}

header{
background:var(--primary);
color:white;
padding:16px 30px;
font-size:20px;
}

.content{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:var(--secondary);
color:white;
padding:20px 0;
}

.sidebar h3{
padding:12px 20px;
cursor:pointer;
}

.sidebar h3:hover{
background:var(--accent);
}

.data{
padding:25px;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:var(--primary);
color:white;
}

button{
border:none;
padding:7px 12px;
border-radius:4px;
cursor:pointer;
}

.btn-pdf{
background:#e67e22;
color:white;
}

.btn-view{
background:#3498db;
color:white;
}

/* ===== MODAL ===== */

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
display:none;
justify-content:center;
align-items:center;

}

.modal-card{

width:650px;
background:white;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
overflow:hidden;

}

.modal-header{

background:var(--primary);
color:white;
padding:15px;
display:flex;
justify-content:space-between;

}

.modal-body{

padding:25px;
line-height:1.6;

}

.close{
cursor:pointer;
font-size:20px;
}

.section{

margin-bottom:15px;

}

.title{

font-weight:bold;
color:#0b3c5d;

}

</style>

</head>

<body>

<header>Emergency Response System</header>

<div class="content">

<div class="sidebar">
<h3 onclick="location.href='Dashboard.html'">Dashboard</h3>
</div>

<div class="data">

<h1>Activity Logs</h1>

<table>

<thead>

<tr>
<th>Name</th>
<th>Contact</th>
<th>Location</th>
<th>Time</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<!-- ================= POPUP ================= -->

<div class="modal" id="detailsModal">

<div class="modal-card">

<div class="modal-header">

<b>Official Incident Report</b>

<span class="close" onclick="closeModal()">✖</span>

</div>

<div class="modal-body" id="reportContent"></div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const { jsPDF } = window.jspdf;

const SUPABASE_URL='https://idogfmuksxbjjmrfdclk.supabase.co';
const SUPABASE_KEY='sb_publishable_49Wi0aMQU0u1YF4nF3PQvg_WbwUscRs';

const supa=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);


/* ================= LOAD TABLE ================= */

async function loadLogs(){

const tableBody=document.getElementById("tableBody");

tableBody.innerHTML="<tr><td colspan='5'>Loading...</td></tr>";

const {data,error}=await supa
.from('Report')
.select('*')
.order('id',{ascending:false});

if(error){

tableBody.innerHTML="<tr><td colspan='5'>Error Loading</td></tr>";
return;

}

tableBody.innerHTML="";

data.forEach(log=>{

const safeData=encodeURIComponent(JSON.stringify(log));

tableBody.innerHTML+=`

<tr>

<td>${log.fullname || '-'}</td>
<td>${log.mobile || '-'}</td>
<td>${log.location || '-'}</td>
<td>${log.datetime || '-'}</td>

<td>

<button class="btn-pdf"
onclick="generateOfficialReport('${safeData}')">
Download PDF
</button>

<button class="btn-view"
onclick="showDetails('${safeData}')">
View Details
</button>

</td>

</tr>

`;

});

}


/* ================= VIEW DETAILS ================= */

function showDetails(encodedData){

const log=JSON.parse(decodeURIComponent(encodedData));

const reportNumber="DMA/"+Date.now();

const html=`

<div class="section">
<span class="title">Report Reference No:</span>
${reportNumber}
</div>

<div class="section">
<span class="title">Reported By:</span>
${log.fullname}
</div>

<div class="section">
<span class="title">Contact:</span>
${log.mobile}
</div>

<div class="section">
<span class="title">Incident Time:</span>
${log.datetime}
</div>

<div class="section">
<span class="title">Disaster Type:</span>
${log.disasterType}
</div>

<div class="section">
<span class="title">Location:</span>
${log.location}
</div>

<div class="section">
<span class="title">Description:</span>
${log.discription}
</div>

<div class="section">
<span class="title">Issued By:</span><br>
Disaster Monitoring & Control Room<br>
National Disaster Management Authority<br>
Government of India
</div>

`;

document.getElementById("reportContent").innerHTML=html;

document.getElementById("detailsModal").style.display="flex";

}


/* ================= CLOSE MODAL ================= */

function closeModal(){

document.getElementById("detailsModal").style.display="none";

}


/* ================= PDF GENERATION ================= */

function generateOfficialReport(encodedData){

const log = JSON.parse(decodeURIComponent(encodedData));

const doc = new jsPDF("p","mm","a4");

const reportNumber = "DMA/" + Date.now();

doc.setFontSize(16);
doc.setFont(undefined,"bold");
doc.text("GOVERNMENT OF INDIA",105,20,{align:"center"});

doc.setFontSize(14);
doc.text("National Disaster Management Authority",105,27,{align:"center"});

doc.setFontSize(12);
doc.setFont(undefined,"normal");
doc.text("OFFICIAL INCIDENT REPORT",105,35,{align:"center"});

doc.line(20,40,190,40);

doc.setFontSize(11);

const statement = `
Report Reference No: ${reportNumber}

This is to officially record that an incident was reported by Mr./Ms. ${log.fullname}
(Contact Number: ${log.mobile}) on ${log.datetime} and the type is ${log.disasterType}.

The reported incident location is identified as:
${log.location}

The victim gives information is:
${log.discription}

The report has been registered in the Disaster Monitoring System
and forwarded to the relevant emergency authorities for action.

Issued By:
Disaster Monitoring & Control Room
National Disaster Management Authority
Government of India
`;

doc.text(statement,20,50,{maxWidth:170});

doc.setFontSize(10);

doc.text(
"System Generated Document - No Physical Signature Required",
105,
285,
{align:"center"}
);

doc.save(`Official_Report_${log.fullname || "Incident"}.pdf`);

}

window.addEventListener("DOMContentLoaded",loadLogs);

</script>

</body>
</html>
