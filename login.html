<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0b3c5d,#1d70a2);
}

.login-container{
    background:#fff;
    width:400px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h2{
    margin-bottom:25px;
    color:#0b3c5d;
}

.input-group{
    margin-bottom:18px;
    text-align:left;
}

.input-group label{
    font-size:13px;
    color:#555;
    margin-bottom:5px;
    display:block;
}

.input-group input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#0b3c5d;
    box-shadow:0 0 5px rgba(11,60,93,0.3);
    outline:none;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0b3c5d;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#0e4b74;
}

.error-msg{
    color:red;
    font-size:13px;
    margin-top:10px;
}

.footer-text{
    margin-top:15px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="login-container">

    <img src="dssm.png" class="logo" alt="Logo">

    <h2>Admin Login</h2>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="error-msg" id="errorMsg"></div>

    </form>

    <div class="footer-text">
        Disaster Management System
    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    try{
        const response = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if(response.ok){
            // redirect after success
            window.location.href = "dashboard.html";
        }else{
            errorMsg.innerText = data.message;
        }

    }catch(err){
        errorMsg.innerText = "Server not running!";
    }
});
</script>

</body>
</html>
